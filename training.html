<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kumquat Sign Language &mdash; Training</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="training-shell">

<a class="nav-link training-shell__nav" href="index.html">Live Page &rarr;</a>

<div class="doodle doodle--fern-corner doodle--fern-corner--tl">
  <div class="fern-flip">
    <img src="fern-right.svg" class="fern-sway-img" alt="" aria-hidden="true">
  </div>
</div>

<div class="doodle doodle--fern-corner doodle--fern-corner--br">
  <img src="fern-left.svg" class="fern-sway-img" alt="" aria-hidden="true">
</div>

<div class="training-shell__stack training-shell__grid">
  <div class="panel-grid">
    <div class="panel panel--camera">
      <div class="camera-frame">
        <video id="camera-video" autoplay playsinline muted></video>
        <canvas id="camera-canvas"></canvas>
        <div class="capture-countdown" id="capture-countdown">
          <span class="capture-countdown__number" id="capture-countdown-number"></span>
          <span class="capture-countdown__label" id="capture-countdown-label"></span>
        </div>
      </div>
      <div class="hand-status">
        <span class="hand-status__dot" id="hand-status-dot"></span>
        <span id="hand-status-label">Waiting for camera&hellip;</span>
      </div>
    </div>

    <div class="panel panel--details">
      <h3 class="section-heading">Details</h3>
      <div class="details-form">
        <div class="field">
          <label for="word-input">Word / Label</label>
          <input type="text" id="word-input" placeholder="e.g. hello" autocomplete="off">
        </div>
        <div class="field">
          <label for="emoji-input">Emoji</label>
          <input type="text" id="emoji-input" placeholder="e.g. 👋" autocomplete="off" maxlength="8">
        </div>

        <button class="btn" id="capture-btn" type="button">Capture Pose</button>
        <div class="capture-progress">
          <div class="capture-progress__bar" id="capture-progress-bar"></div>
        </div>
        <p class="status-line status-line--tight" id="capture-status">Press Capture, then get into position — recording starts after a 3-second countdown and runs for 5 seconds.</p>

        <button class="btn btn--secondary" id="save-btn" type="button" disabled>Save Gesture</button>
      </div>
    </div>
  </div>

  <div class="saved-gestures-box">
    <h3 class="section-heading section-heading--sm">Saved Gestures</h3>
    <p class="gesture-count" id="gesture-count">0 gestures saved</p>
    <ul class="gesture-list" id="gesture-list"></ul>
  </div>
</div>

<script type="module" src="js/training.js"></script>
</body>
</html>
