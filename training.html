<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kumquat Sign Language &mdash; Training</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="training-shell">

<a class="nav-link training-shell__nav" href="index.html">Live Page &rarr;</a>

      <path d="M0,-45 C-7,-49 -11,-45 -11,-39 C-7,-37 -3,-41 0,-45 Z" stroke="currentColor" stroke-width="1.1"/>

<svg class="doodle doodle--fern doodle--fern-bl" viewBox="0 0 130 170" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <g id="frond-bl">
      <path d="M0,0 C-2,-30 2,-60 0,-88" stroke="currentColor" stroke-width="1.8"/>
      <path d="M0,-20 C-8,-24 -13,-20 -13,-13 C-8,-11 -3,-15 0,-20 Z" stroke="currentColor" stroke-width="1.1"/>
      <path d="M0,-30 C8,-34 13,-30 13,-23 C8,-21 3,-25 0,-30 Z" stroke="currentColor" stroke-width="1.1"/>
      <path d="M0,-45 C-7,-49 -11,-45 -11,-39 C-7,-37 -3,-41 0,-45 Z" stroke="currentColor" stroke-width="1.1"/>
      <path d="M0,-55 C7,-59 11,-55 11,-49 C7,-47 3,-51 0,-55 Z" stroke="currentColor" stroke-width="1.1"/>
      <path d="M0,-68 C-5,-71 -8,-68 -8,-63 C-5,-62 -2,-65 0,-68 Z" stroke="currentColor" stroke-width="1"/>
      <path d="M0,-76 C5,-79 8,-76 8,-71 C5,-70 2,-73 0,-76 Z" stroke="currentColor" stroke-width="1"/>

  <g transform="translate(65,160) rotate(-30)">
    <use href="#frond-bl" class="fern-leaf"/>
  </g>
  <g transform="translate(65,160) scale(1.1)">
    <use href="#frond-bl" class="fern-leaf fern-leaf--delay-1"/>
  </g>
  <g transform="translate(65,160) rotate(30)">
    <use href="#frond-bl" class="fern-leaf fern-leaf--delay-2"/>

<div class="panel-grid training-shell__grid">
  <div class="panel panel--camera">
    <div class="panel__inner">
      <h3 class="panel__title">Camera + Handtracking Setup</h3>
      <div class="camera-frame">
        <video id="camera-video" autoplay playsinline muted></video>
        <canvas id="camera-canvas"></canvas>
      </div>
      <div class="hand-status">
        <span class="hand-status__dot" id="hand-status-dot"></span>
        <span id="hand-status-label">Waiting for camera&hellip;</span>
      </div>
    </div>
  </div>

  <div class="panel panel--details">
    <h3 class="section-heading">Details</h3>
    <div class="details-form">
      <div class="field">
        <label for="word-input">Word / label</label>
        <input type="text" id="word-input" placeholder="e.g. hello" autocomplete="off">
      </div>
      <div class="field">
        <label for="emoji-input">Emoji</label>
        <input type="text" id="emoji-input" placeholder="e.g. 👋" autocomplete="off" maxlength="8">
      </div>

      <button class="btn" id="capture-btn" type="button">Capture Pose</button>
      <div class="capture-progress">
        <div class="capture-progress__bar" id="capture-progress-bar"></div>
      </div>
      <p class="status-line status-line--tight" id="capture-status">Hold your sign steady, then press Capture.</p>

      <button class="btn btn--secondary" id="save-btn" type="button" disabled>Save Gesture</button>

      <h3 class="section-heading section-heading--sm">Saved Gestures</h3>
      <ul class="gesture-list" id="gesture-list"></ul>
    </div>
  </div>
</div>

<script type="module" src="js/training.js"></script>
</body>
</html>
